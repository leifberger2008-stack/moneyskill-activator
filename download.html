<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download • MoneySkillBot</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
          colors: { brand: { 400: '#38bdf8', 500: '#0ea5e9' }, dark: { 900: '#0b0f19', 800: '#111827' } }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0b0f19; color: #fff; overflow-x: hidden; }
    .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .text-gradient { background: linear-gradient(135deg, #34d399 0%, #059669 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative font-sans items-center justify-center p-4">
  
  <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute top-[30%] left-[30%] w-96 h-96 bg-green-500 rounded-full mix-blend-screen filter blur-[120px] opacity-20"></div>
  </div>

  <div class="relative z-10 w-full max-w-2xl glass rounded-3xl p-8 shadow-2xl">
    <div class="text-center mb-10">
      <div class="w-16 h-16 mx-auto bg-green-500/20 text-green-400 rounded-full flex items-center justify-center text-3xl mb-4 border border-green-500/30">
        <i class="fa-solid fa-check"></i>
      </div>
      <h1 class="text-4xl font-display font-extrabold mb-2">Payment Successful!</h1>
      <p class="text-gray-400">Generate your personalized configuration file below to finish setting up.</p>
    </div>

    <div class="space-y-6 max-w-md mx-auto">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">MoneySkill Username</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500">
            <i class="fa-solid fa-user"></i>
          </div>
          <input id="username" type="text" placeholder="e.g. s1234567" class="w-full pl-11 pr-4 py-3 bg-dark-900/50 rounded-xl border border-gray-700/50 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none transition-all">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">MoneySkill Password</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500">
            <i class="fa-solid fa-lock"></i>
          </div>
          <input id="password" type="password" placeholder="••••••••" class="w-full pl-11 pr-4 py-3 bg-dark-900/50 rounded-xl border border-gray-700/50 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none transition-all">
        </div>
      </div>

      <button onclick="generateConfig()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-green-500/20 transition-all hover:scale-[1.02] active:scale-[0.98] mt-4">
        Download Config & Instructions <i class="fa-solid fa-download ml-2 text-sm"></i>
      </button>

      <div class="mt-8 border-t border-white/10 pt-8 text-center hidden" id="step2">
        <h3 class="font-display font-bold text-xl mb-4 text-brand-400">Step 2: Download Application</h3>
        <p class="text-sm text-gray-400 mb-6">Download the actual .exe application. Place both the application and your config.lic file in the same folder, then double click the .exe to run!</p>
        
        <button onclick="downloadExe()" class="bg-white/10 hover:bg-white/20 border border-white/20 text-white font-medium py-3 px-8 rounded-xl transition-all">
          Download MoneySkillBot.exe
        </button>
      </div>
    </div>
  </div>

  <script>
    function downloadExe() {
      // NOTE: Replace this link with the newly built GitHub release containing the fixed Exe!
      window.open("https://github.com/MoneySkillKiller/moneyskill-activator/releases/download/v1.0/MoneySkillBot.exe", "_blank");
    }

    function generateConfig() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        alert("⚠️ Please enter both your MoneySkill username and password.");
        return;
      }

      const config = {
        username: username,
        password: password,
        deepseek_key: "sk-9c74f97a7ed84ba5a0c08774c15bfab6"
      };

      const zip = new JSZip();
      zip.file("config.lic", JSON.stringify(config, null, 2));
      zip.file("README_INSTRUCTIONS.txt", "=== INSTRUCTIONS ===\n\n1. Place 'config.lic' in the EXACT SAME FOLDER as 'MoneySkillBot.exe'.\n2. Do not rename 'config.lic'.\n3. Double Click MoneySkillBot.exe to start.\n4. To stop the bot, simply close the browser window or the terminal window.\n\nEnjoy!");

      zip.generateAsync({type:"blob"}).then(content => {
        const link = document.createElement("a");
        link.href = URL.createObjectURL(content);
        link.download = "MoneySkillBot_Config.zip";
        link.click();
        
        // Reveal step 2
        document.getElementById("step2").classList.remove("hidden");
      });
    }
  </script>
</body>
</html>
